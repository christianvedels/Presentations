# Robert Fogel og jernbanernes paradoks

.pull-left[
**Robert Fogel (1964):** *"Railroads and American Economic Growth"*

&gt; *Jernbaner var ikke afgørende for USA's vækst*

Hvad ville det have kostet at fragte det samme gods uden jernbanen?
**Svar: kun 2–3% af BNP**

Nobel-pris 1993 — for kontrafaktisk metode
]

.pull-right[
&lt;img src="Figures/Fogel.jpg" style="width:50%;display:block;margin:auto"&gt;

.small123[*"Hvad ville der være sket uden jernbanen?"*
— Fogels spørgsmål er kernen i al god økonomi]
]

.footnote[.small123[Fogel, R.W. (1964). *Railroads and American Economic Growth*. Johns Hopkins Press.]]

???
Fogel er en god fortælling. Han vandt Nobelprisen for at sige noget kontraintuitivt. Hans kontrafaktiske metode var banebrydende. Hans konklusion er omdiskuteret: nyeste forskning viser at han undervurderede effekterne markant, fordi han ikke regnede med hvad der sker når ALLE markeder ændres på én gang.

# Kliometrikerne vs. historikerne

.pull-left[
**Den nye økonomiske historie (~1960'erne)**
— Fogel, North, McCloskey

- Kontrafaktisk ræsonnement
- Statistiske metoder
- Kvantificering af historisk forandring

&gt; *"Man kan ikke vide, hvad der ikke skete"*
.grey[— traditionel historikerindvending]
]

--

.pull-right[
**Kliometrikernes svar:**
&gt; *"Alle historiske påstande er implicit kontrafaktiske — vi gør det bare eksplicit"*

.small123[Kliometri er i dag mainstream — og metoden vi bruger i dette papir.]
]

???
Denne slide giver kontekst. Det er ikke historiebog-fortælling — det er forsøget på at kvantificere hvad der faktisk skete, og adskille årsag fra korrelation. Fogels provokation: han tog det implicitte kontrafaktum alvorligt og fandt at jernbanerne ikke var uerstattelige. Debatten ikke afgjort men kliometri er dominerende metode. Eksempel: "Jernbanen var afgørende for USA's vækst" — er det ikke selv en kontrafaktisk påstand?

# Den lange hukommelse: effekter der ikke forsvinder

.pull-left-wide[
**Beeching-rapporten (1963), UK:**
~5.000 km jernbane lukket

Gibbons et al. (2024):
&gt; Vedvarende negative konsekvenser *årtier* efter lukningen

&gt; Svarende til 24 pct lavere befolkningsvækst i hårest ramte områder
]



???
Dette er bro til nutiden. Spørgsmålet om lokalbaner i Danmark er ikke trivielt. Jernbaner forankrer steder: virksomheder etablerer sig, folk slår sig ned, institutioner placeres. Når infrastrukturen forsvinder, er alt det svært at flytte. "Path dependence" — fortiden sætter rammerne for fremtiden.

# "Getting to Denmark": tre ingredienser

.panelset[
.panel[.panel-name[Andelsmejerier]
.pull-left[
![Generalforsamling](Figures/Generalforsamling_i_Ansager_Andelsmejeri.jpg)
.small123[*Generalforsamling i Ansager Andelsmejeri*]
]
.pull-right[
**Andelsmejeriet:** bønder der går sammen om produktion og afsætning

- Fra 1882: spredte sig eksplosivt
- Kræver tillid, kontrakter, fælles beslutninger
- Danmarks industrialisering var ikke kun i byen - den var også på landet
]
]
.panel[.panel-name[Grundtvig]
.pull-left[
**N.F.S. Grundtvig (1783–1872)**

&gt; *"Det levende ord"* — viden skabes i samtalen, ikke ved udenadslære

- Folkehøjskolerne: dannelse frem for eksamener
- Unge landmænd: dansk sprog, historie, demokrati
- Højskoler over hele landet
]
.pull-right[
&lt;img src="Figures/Grundtvig_wikimedia.jpg" style="width:50%;display:block;margin:auto"&gt;  
.small123[N.F.S. Grundtvig (1783–1872), wikimedia commons]
]
]
.panel[.panel-name[Forsamlingshuse]
.pull-left-wide[
**Forsamlingshuset:** lokalt mødelokale, bygget og ejet af bønderne selv

Fra ~1880: spredte sig som ringe i vand

- Grundtvigske foredrag og politiske debatter
- Planlægning af andelsmejerier
- Afstemninger om fælles beslutninger

&gt; I 1920 var der forsamlingshuse i næsten halvdelen af alle danske sogne
]
.pull-right-narrow[
![Forsamlingshus](Figures/Forsamlingshus.jpg)
.small123[*Dansk forsamlingshus, ca. 1900*]
]
]
.panel[.panel-name[Overblik]
&lt;img src="Figures/Conceptual_framework.png" style="width:50%;display:block;margin:auto"&gt;
.pull-right-wide[
**Vores spørgsmål:** Kan vi *måle* jernbanernes bidrag til begge strømme?
]
]
]


???
Grundtvig er en nøglefigur — konservativ nationalromantiker OG progressiv demokrat. Forsamlingshuset er det konkrete sted, hvor demokratiet levede lokalt. Jernbaner og Grundtvig er ikke alternative forklaringer — de er komplementære. Det motiverende mønster (data fra 1915): steder med jernbane → 10,7% mere sandsynlige for andelsmejerier; steder med forsamlingshus → 13,9% mere sandsynlige. Og disse effekter er UAFHÆNGIGE af hinanden.
