# The tool we present: *CHAOS*

--

1. If you have a *Source* containing: Occupations + some outcome (skills, income, etc.)

--

2. A *Target* containing: Occupations only (e.g. census data)

--

3. We provide a method for map any target occupation to a predicted outcome

--

**Aproach:** We do probabilistic mapping to a standardized scheme. E.g. HISCO as an intermediate step


--

.pull-left-narrow[
### What you provide:
- Source: `\(\{d_i, y_i\}\)`

| Occupation | Income |
|---|---|
| blacksmith | $2.30 |
| tailor | $1.98 |
| farmer | $1.42 |
]

--

.pull-right-narrow[
### What you get:
- Target: `\(\{d_k, \hat{y}_k\}\)`

| Occupation | Income |
|---|---|
| smith | [Estimate] |
| tailor | [Estimate] |
| agricultural worker | [Estimate] |
]

# Literature

.small123[
- IPUMS occscore introduced by Sobek (1995), but similar measures used throughout the literature (e.g. Preston &amp; Haines 1991)

- This and similar measures have become prevalent in the literature.

- However, they entail a number of problems, mainly stemming from source-target-shift (Inwood et al. 2019, Saavedra &amp; Twinam, 2020).

- A few fixes and alternative methods proposed (Saavedra &amp; Twinam, 2020, Paker, Stephenson &amp; Wallis, 2025, Vafa et al 2024, Mühlbach, 2021)

]

--

&gt; .chaosred[**We propose a new method that is efficient and ML-powered but interpretable.**]

# Econometric framework

---
name: bias

# Problem: Bias from occ. scores

`$$y_i = \alpha + \beta x_i + \varepsilon_i$$`

.small123[
where `\(y_i\)` is the true outcome (e.g. wage) to be replaced with `\(\mu_S(d_i)\)` s.t.
]

--

`$$\mu_S(d_i) = \alpha + \beta x_i + \varepsilon_i$$`


--

.pull-left-wide[
.small123[
Let `\(\mu_S(d_i)\)` be the source-assigned score, `\(\mu_T(d_i)\)` the target-population mean, `\(y_i\)` the true outcome. The total proxy error decomposes as:

`$$m_i \;=\; \underbrace{\mu_S(d_i) - \mu_T(d_i)}_{\delta(d_i)\ \text{source-target drift}} \;+\; \underbrace{\mu_T(d_i) - y_i}_{r_i\ \text{within-occupation residual}}$$`

Then:

`$$\hat{\beta} = \beta + \frac{\text{Cov}(x_i,\, m_i)}{\text{Var}(x_i)}$$`

]
]

.pull-right-narrow[
### The two big problems of occupational scores:
.small123[
`\(\delta(d_i)\)` — **source-target drift**
1950 US wages `\(\neq\)` 1850 England.

`\(r_i\)` — **within-occupation residual**
Apprentice `\(\neq\)` master;
]
]

--

.pull-left-wide[
`$$\require{cancel}$$`
`\(m_i \;=\; \cancel{\underbrace{\mu_S(d_i) - \mu_T(d_i)}_{\delta(d_i)\ \text{source-target drift}}} \;+\; \underbrace{\mu_T(d_i) - y_i}_{r_i\ \text{within-occupation residual}}\)`
]

.pull-right-narrow[
.chaosred[**CHAOS addresses the first and formalizes the second.**]
]

???

IPUMS occscore uses 1950 US wages → Canadian migrants. Blacksmith rank shifts. Inwood et al. (2019).

r_i: "Smith" = goldsmith or blacksmith. "Tailor" = master or journeyman.

name: chaos-math

# Bringing Maths to CHAOS

Now, let's introduce a unversal encoding `\(h_j\)`. *Let's say we know* `\(\color{#2c5c34}{Pr(h_j \mid d)}\)`

--

.pull-left[
.small123[
### Step 1 — by definition
`$$\color{#b33d3d}{\mathbb{E}(y_i \mid h_j)} = \sum_i y_i\Pr(y_i\mid h_j)$$`

### Step 2 — Bayes rule
`$$\color{#b33d3d}{\mathbb{E}(y_i \mid h_j)} = \sum_i y_i\frac{\Pr(h_j \mid y_i) \Pr(y_i)}{\Pr(h_j)}$$`

### Step 3 — swap `\(y\)` for `\(d\)`
`$$\color{#b33d3d}{\mathbb{E}(y_i \mid h_j)} = \sum_i y_i\frac{\color{#2c5c34}{\Pr(h_j \mid d_i)} \Pr(d_i)}{\Pr(h_j)}$$`

]
]

--

.pull-right[
.small123[
### Step 4 — apply to target
`$$\mathbb{E}(y_k \mid d_k) = \sum_j \color{#b33d3d}{\mathbb{E}(y_i \mid h_j)}\, \color{#2c5c34}{\Pr(h_j \mid d_k)}$$`

### Key assumptions
1. **Source–target relevance:** source and target are iid draws from the same distribution
2. **Broadband classifier:** `\(\mathbb{E}(y_i \mid h_j, d_i) = \mathbb{E}(y_i \mid h_j)\)`

]
]

---
name: method-check

# Checking results — evidence for each prediction

--

.pull-left[
### Evidence — a free byproduct of Bayes' rule

`$$\text{Evidence}(d_k) = \sum_j \Pr(h_j) \cdot \Pr(h_j \mid d_k)$$`

&gt; Empirical backing for `\(d_k\)` — falls out of the derivation for free.
]

--

.pull-right[
### Effective observations

`$$N_\text{eff}(d_k) = N_\text{source} \times \text{Evidence}(d_k)$$`

&gt; *How many source observations back this prediction?*

- High `\(\Rightarrow\)` reliable
- Low `\(\Rightarrow\)` reverts to source mean
]

name: regression-setup

# Setup

.pull-left-wide[
.chaosred[**Warning:** Everything that follows is proof of concept. Do not believe anything you see.]

OLS throughout; SEs clustered by occupation. Four skill dimensions:
- cognitive,
- routine cognitive,
- routine manual,
- mechanical.

Also:

**Specialization** `\(= \max_k\!\left(s_k \displaystyle\sum_{j \neq k} s_j^{-1}\right)\)` — high when one dimension clearly dominates the skill profile.
]

name: regression-specs

# Regression specifications

.pull-left-wide[
**(1) Skill premium by country** — estimated separately per skill `\(s\)` and country `\(c\)`:
`$$\log w_{ict} = \beta_c \, s_i + \gamma_t + \varepsilon_{ict}$$`

**(2) Skill premium over time** — estimated separately per skill `\(s\)` and region `\(r\)`, reference 1800:
`$$\log w_{irt} = \sum_{t \neq 1800} \beta_t \bigl(s_i \cdot \mathbf{1}[\text{decade}=t]\bigr) + \gamma_t + \varepsilon_{irt}$$`

**(3) Skill-adjusted gender wage gap** — all skills jointly as controls, per region, reference 1800:
`$$\log w_{irt} = \sum_{t \neq 1800} \delta_t \bigl(F_i \cdot \mathbf{1}[\text{decade}=t]\bigr) + \mathbf{s}_i'\boldsymbol{\beta} + \gamma_t + \varepsilon_{irt}$$`
]

.pull-right-narrow[
- `\(s_i\)` = one (binarized) skill score at a time
- `\(\mathbf{s}_i\)` = all four skill scores (3 only)
- `\(\gamma_t\)` = decade fixed effects
- `\(F_i = \mathbf{1}[\text{female}]\)`
]

name: appendix-math-advanced

# CHAOS: multiple sources + debiasing .chaosred[(if time)]

.pull-left[
.small123[
### Multiple sources `\(s\)`
`$$\mathbb{E}(y_i\mid h_j)=\sum_i \left[ y_i \sum_s \left(
    \frac{Pr(h_j\mid y_i, S_s)\,Pr(y_i\mid S_s)\,Pr(S_s)}{Pr(h_j)} \right) \right]$$`

### Gibberish input
If the classifier is uninformative: `\(Pr(h_j\mid d_k) = Pr(h_j)\)`, then:
`$$\mathbb{E}(y_k|d_k) = \mathbb{E}(y_i)$$`
Prediction reverts gracefully to the source mean.
]
]

.pull-right[
.small123[
### Bias correction (PPI-style)
Bias: `\(\mathbb{E}(\hat{y}_k)\neq\mathbb{E}(y_k)\)`

Under relevance assumption:
`$$\mathbb{E}(y_k - \hat{y}_k) = \mathbb{E}(y_i - \hat{y}_i)$$`

`\(\Rightarrow\)` Observable via LOO-CV on the source.

`$$\mu(y)\approx \mu(\hat{y})+\frac{1}{k}\mu(y-\hat{y})$$`

Generalizes to regression:
`$$\hat\beta = \hat\beta_{\text{naive}} + (X'X)^{-1}X'\widehat{B}(d)$$`

.chaosred[**Code still being implemented**]
]
]

name: appendix-skills-ltm

# Skills from the London Tradesman (1747)

.pull-left-wide[
### Extracting skills
- GPT-4o returns a JSON list of skills per occupation from LTM descriptions

### Measuring skills (embedding distance)
- Map skill list `\(S = \{s_1, \dots, s_N\}\)` into 384-dim space via Sentence-BERT (all-MiniLM-L6-v2)
- Construct skill index via cosine similarity to anchor phrases:

`$$\text{routine proportion}_i = \frac{\bar{\sigma}_{i,\text{routine}}}{\bar{\sigma}_{i,\text{routine}} + \bar{\sigma}_{i,\text{non-routine}}}$$`
]

.pull-right-narrow[
.panelset[
.panel[.panel-name[Goldsmith skills]
.tiny123[
`"making all manner of utensils in gold or silver"`,
`"casting works with raised figures in moulds"`,
`"polishing and finishing cast works"`,
`"using flatting-mills to reduce metal to required thinness"`,
`"making all moulds for their work"`
]
]
.panel[.panel-name[Anchors]

name: appendix-bias-rhs

# Bias when the occupational score is on the RHS

.pull-left-wide[
Now suppose `\(\hat{y}_i\)` is the **explanatory variable**:

`$$x_i = \alpha + \beta_2 \hat{y}_i + \varepsilon_i, \quad \hat{y}_i = y_i + m_i$$`

The OLS estimator gives:

`$$\hat{\beta}_2 = \beta_2 \!\left(1 - \frac{\text{Var}(m_i)}{\text{Var}(y_i)}
\right) - \frac{\text{Cov}(y_i,\, m_i)}{\text{Var}(y_i)} + \frac{\text{Cov}(m_i,\, \varepsilon_i)}{\text{Var}(y_i)}$$`

Two sources of bias:

1. **Attenuation** -- `\(\text{Var}(m_i)\)` dilutes the signal, shrinking `\(\hat{\beta}_2\)` toward zero
2. **Correlation bias** -- if `\(m_i\)` co-moves with `\(y_i\)` or `\(\varepsilon_i\)`, slope shifts unpredictably
]

.pull-right-narrow[
Recall `\(m_i = \hat{y}_i - y_i\)` decomposes as `\(\delta(d_i) + r_i\)` (drift + residual):

- `\(\delta\)` correlated with `\(x_i\)` `\(\Rightarrow\)` correlation bias. CHAOS .green[**reduces**] `\(\delta\)`.
- `\(r_i\)` correlated with `\(x_i\)` `\(\Rightarrow\)` .chaosred[**irreducible.**]
- Attenuation always present; CHAOS reduces `\(\text{Var}(m_i)\)` by eliminating `\(\delta\)`.
]

# Source B — Skills (London Tradesman, 1747)

.pull-left-wide[
- 229 occupations with natural-language skill descriptions
- **GPT-4o** extracts a JSON list of skills per occupation
- **Sentence-BERT** embeds each skill; cosine similarity to anchor phrases gives a score per dimension

**Four dimensions** — share of skills semantically close to:
- **Cognitive** — *"abstract reasoning, analytical thinking"*
- **Routine cognitive** — *"repetitive task, following explicit rules"*
- **Routine manual** — *"repetitive task, explicit rules"* (physical execution)
- **Manual** — *"operate machinery, assemble parts"*
